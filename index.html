<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login.css">
  <title>Login</title>
</head>
<body>

  <video autoplay muted loop playsinline id="bgVideo">
    <source src="workout.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="login-box">
    <h1>Welcome Back</h1>
    <p>Track your health journey</p>

    <div class="form-box">
      <input type="email" id="emailInput" placeholder="Email">
      <input type="password" id="passwordInput" placeholder="Password">
      
      <button class="login-btn" id="submitBtn">Login</button>

      <p class="switch-text">
        Don't have an account? 
        <span onclick="switchForm()">Create Account</span>
      </p>

      <div class="divider">
        <span>or continue with</span>
      </div>

      <button class="google-btn">
        <img src="https://www.google.com/favicon.ico" width="18"> 
        Continue with Google
      </button>

      <button class="apple-btn">
        Continue with Apple
      </button>
    </div>
  </div>

  <div class="transition-screen" id="transitionScreen">
    <div class="runner">🏃</div>
    <h2 id="welcomeText"></h2>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
